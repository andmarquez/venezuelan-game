name: Deploy live site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.app.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect app type
        id: app
        run: |
          NAME=$(node -p "require('./package.json').name")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          case "$NAME" in
            concert-kinetic-typography|andsiosas-creative-quest|venezuelan-game)
              echo "skip=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Skipping Pages deploy: unsupported package '$NAME'."
              ;;
          esac

      - name: Setup Node
        if: steps.app.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.app.outputs.skip != 'true'
        run: npm ci

      - name: Build for GitHub Pages
        if: steps.app.outputs.skip != 'true'
        run: npm run build:pages
        env:
          BASE_PATH: /venezuelan-game/

      - name: Upload Pages artifact
        if: steps.app.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: needs.build.outputs.skip != 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
