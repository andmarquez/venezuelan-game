<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#b8e0f5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Venezuelan Game</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none;
        background: #b8e0f5;
        font-family: 'Nunito', system-ui, sans-serif;
      }

      html.is-mobile-view.is-portrait-view,
      html.is-mobile-view.is-portrait-view body {
        background: #f8c8dc;
      }

      #game-container {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #b8e0f5;
      }

      /* Phaser sets canvas display size — do NOT override width/height (causes stretch). */
      #game-container canvas {
        display: block;
        touch-action: none;
      }

      #game-container[hidden] {
        display: none !important;
      }

      #rotate-prompt {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fce4ec;
        pointer-events: auto;
        touch-action: none;
      }

      #rotate-prompt[hidden] {
        display: none !important;
      }

      .rotate-prompt__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        padding: 1.5rem;
        text-align: center;
        color: #880e4f;
        font-family: 'Inter', 'Nunito', system-ui, sans-serif;
        font-weight: 700;
        font-size: clamp(1.25rem, 5vw, 1.75rem);
        line-height: 1.35;
      }

      .rotate-prompt__icon {
        width: clamp(5rem, 28vw, 7rem);
        height: clamp(5rem, 28vw, 7rem);
        object-fit: contain;
      }

      #desktop-prompt {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: linear-gradient(165deg, #b8e0f5 0%, #d6eaf8 48%, #fff5dc 100%);
        pointer-events: auto;
        touch-action: none;
      }

      #desktop-prompt[hidden] {
        display: none !important;
      }

      .desktop-prompt__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
        width: min(100%, 26rem);
        padding: 2rem 1.75rem;
        text-align: center;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 1.5rem;
        box-shadow:
          0 1rem 2.5rem rgba(1, 104, 240, 0.12),
          0 0.25rem 0.75rem rgba(55, 68, 164, 0.08);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .desktop-prompt__icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 4.5rem;
        height: 4.5rem;
        font-size: 2.25rem;
        line-height: 1;
        background: linear-gradient(145deg, #e3f2fd 0%, #ffffff 100%);
        border-radius: 50%;
        box-shadow: 0 0.35rem 1rem rgba(1, 104, 240, 0.15);
      }

      .desktop-prompt__title {
        margin: 0;
        color: #01579b;
        font-family: 'Nunito', system-ui, sans-serif;
        font-size: clamp(1.35rem, 3.2vw, 1.65rem);
        font-weight: 800;
        line-height: 1.3;
        letter-spacing: -0.02em;
      }

      .desktop-prompt__hint {
        margin: 0;
        color: #3744a4;
        font-family: 'Inter', system-ui, sans-serif;
        font-size: clamp(1rem, 2.4vw, 1.125rem);
        font-weight: 500;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="rotate-prompt" hidden>
      <div class="rotate-prompt__inner">
        <img class="rotate-prompt__icon" alt="" aria-hidden="true" width="112" height="112" />
        <p>Rotate your phone<br />to play</p>
      </div>
    </div>
    <div id="desktop-prompt" hidden>
      <div class="desktop-prompt__inner">
        <span class="desktop-prompt__icon" aria-hidden="true">📱</span>
        <h1 class="desktop-prompt__title">At the moment, this game is only available on mobile.</h1>
        <p class="desktop-prompt__hint">Open the link on your phone to play.</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
